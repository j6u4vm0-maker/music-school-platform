name: Hourly LINE Reminders

on:
  schedule:
    # Runs every hour at 0 minutes past the hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call Reminder API
        run: |
          # Replace YOUR_SECRET with your CRON_SECRET from your ENV
          curl -X GET "https://music-school-platform--musicschoolsystem-e3557.asia-east1.hosted.app/api/cron/reminders?secret=${{ secrets.CRON_SECRET }}"
